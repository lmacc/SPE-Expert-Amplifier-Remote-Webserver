name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v1.4.0'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
          - label: linux-arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential \
            qt6-base-dev qt6-serialport-dev qt6-websockets-dev \
            qt6-httpserver-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Resolve version
        id: ver
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${tag}"           >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"     >> "$GITHUB_OUTPUT"

      - name: Stage tarball
        run: |
          arch="${{ matrix.label }}"
          stage="stage/spe-remote-qt-${{ steps.ver.outputs.version }}-${arch}"
          mkdir -p "$stage"
          cp build/spe-remote-qt "$stage/"
          cp build/spe-remoted   "$stage/"
          cp README.md LICENSE INSTALL-LINUX.md INSTALL-RPI.md "$stage/"
          tar -C stage -czf \
            "spe-remote-qt-${{ steps.ver.outputs.version }}-${arch}.tar.gz" \
            "$(basename "$stage")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spe-remote-qt-${{ steps.ver.outputs.version }}-${{ matrix.label }}
          path: spe-remote-qt-*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64
          modules: 'qthttpserver qtwebsockets qtserialport'
          cache: true

      - name: Configure
        shell: cmd
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: cmake --build build -j

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${tag}"           >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"     >> "$GITHUB_OUTPUT"

      - name: Stage zip
        shell: pwsh
        run: |
          $stage = "stage/spe-remote-qt-${{ steps.ver.outputs.version }}-windows-x64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item build/spe-remote-qt.exe $stage/
          Copy-Item build/spe-remoted.exe   $stage/
          windeployqt --release --no-translations --no-system-d3d-compiler `
            --no-opengl-sw $stage/spe-remote-qt.exe
          Copy-Item README.md          $stage/
          Copy-Item LICENSE            $stage/
          Copy-Item INSTALL-WINDOWS.md $stage/
          Compress-Archive -Path "$stage/*" `
            -DestinationPath "spe-remote-qt-${{ steps.ver.outputs.version }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spe-remote-qt-${{ steps.ver.outputs.version }}-windows-x64
          path: spe-remote-qt-*.zip
          if-no-files-found: error

  build-macos:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14          # Apple Silicon runner
          # macos-x64 (Intel, runner: macos-13) is added on demand.
          # GitHub deprecated macos-13 in late 2025 and the runner pool
          # is heavily contended. Re-add this entry and force-update the
          # release tag (or workflow_dispatch with tag=vX.Y.Z) to upload
          # the Intel tarball into the existing release.
          # - label: macos-x64
          #   os: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: clang_64
          modules: 'qthttpserver qtwebsockets qtserialport'
          cache: true

      - name: Install build tools
        run: brew install ninja

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Resolve version
        id: ver
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${tag}"           >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"     >> "$GITHUB_OUTPUT"

      - name: Stage tarball
        run: |
          arch="${{ matrix.label }}"
          stage="stage/spe-remote-qt-${{ steps.ver.outputs.version }}-${arch}"
          mkdir -p "$stage"
          cp build/spe-remote-qt "$stage/"
          cp build/spe-remoted   "$stage/"
          cp README.md LICENSE INSTALL-LINUX.md "$stage/"
          tar -C stage -czf \
            "spe-remote-qt-${{ steps.ver.outputs.version }}-${arch}.tar.gz" \
            "$(basename "$stage")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spe-remote-qt-${{ steps.ver.outputs.version }}-${{ matrix.label }}
          path: spe-remote-qt-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: ver
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Publish / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/spe-remote-qt-*.zip artifacts/spe-remote-qt-*.tar.gz --clobber
          else
            gh release create "$tag" \
              --title "$tag — SPE Expert Amplifier Remote Webserver" \
              --generate-notes \
              artifacts/spe-remote-qt-*.zip artifacts/spe-remote-qt-*.tar.gz
          fi
