name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
          - label: linux-arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential \
            qt6-base-dev qt6-serialport-dev qt6-websockets-dev \
            qt6-httpserver-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64
          modules: 'qthttpserver qtwebsockets qtserialport'
          cache: true

      - name: Configure
        shell: bash
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build -j
